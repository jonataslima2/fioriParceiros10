# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: fiori.z10bp
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        ignoreCertErrors: true # If set to true, certificate errors will be ignored. E.g. self-signed certificates will be accepted
        target:
          url: http://S4HANA.IDES.COM:9222/
          client: '400'
        app:
          name: Z10_BP
          description: Feito com Fiori Tools
          package: $TMP
          transport: ''
        exclude:
          - /test/
